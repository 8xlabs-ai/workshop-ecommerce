version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: shopstream-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopstream
      POSTGRES_USER: shopstream
      POSTGRES_PASSWORD: shopstream
    ports:
      - "5433:5432"
    volumes:
      - shopstream_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopstream -d shopstream"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shopstream-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: shopstream-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI — http://localhost:8025

volumes:
  shopstream_pg_data:
