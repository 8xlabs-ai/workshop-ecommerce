name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shopstream
          POSTGRES_PASSWORD: shopstream
          POSTGRES_DB: shopstream
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://shopstream:shopstream@localhost:5432/shopstream
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars
      PAYX_API_KEY: sk_test_ci
      PAYX_PUBLIC_KEY: pk_test_ci
      PAYX_API_BASE: https://api.sandbox.payx.example/v1
      FF_GUEST_CHECKOUT_ENABLED: 'false'
      FF_ACCOUNT_UPSELL_AFTER_GUEST: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm --filter @shopstream/api db:migrate
      - run: pnpm test
      - run: pnpm build
